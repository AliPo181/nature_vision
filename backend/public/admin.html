<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nature Vision - Admin Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #27500A 0%, #3B6D11 100%);
            color: #333;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            color: #27500A;
            font-size: 32px;
            margin-bottom: 10px;
        }

        header p {
            color: #666;
            font-size: 14px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .stat-card h3 {
            color: #666;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .stat-card .number {
            font-size: 40px;
            font-weight: bold;
            color: #27500A;
        }

        .tabs {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .tab-buttons {
            display: flex;
            border-bottom: 1px solid #e0e0e0;
        }

        .tab-btn {
            flex: 1;
            padding: 16px;
            border: none;
            background: white;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
        }

        .tab-btn.active {
            color: #27500A;
            border-bottom-color: #27500A;
            background: #f9f9f9;
        }

        .tab-btn:hover {
            background: #f5f5f5;
        }

        .tab-content {
            display: none;
            padding: 20px;
        }

        .tab-content.active {
            display: block;
        }

        .users-list,
        .sessions-list,
        .events-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .user-item,
        .session-item,
        .event-item {
            background: #f9f9f9;
            padding: 16px;
            border-radius: 8px;
            border-left: 4px solid #639922;
            cursor: pointer;
            transition: all 0.3s;
        }

        .user-item:hover,
        .session-item:hover,
        .event-item:hover {
            background: #f0f0f0;
            transform: translateX(4px);
        }

        .user-item.expanded,
        .session-item.expanded,
        .event-item.expanded {
            background: white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .item-header .id {
            font-family: monospace;
            font-size: 12px;
            color: #999;
            background: #e8e8e8;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .item-meta {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: #666;
            flex-wrap: wrap;
        }

        .item-details {
            display: none;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #e0e0e0;
        }

        .item-details.show {
            display: block;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            font-size: 13px;
        }

        .detail-label {
            color: #666;
            font-weight: 500;
        }

        .detail-value {
            color: #333;
            font-family: monospace;
            word-break: break-all;
        }

        .event-type {
            display: inline-block;
            background: #639922;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            margin: 4px 0;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #27500A;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .refresh-btn {
            background: #27500A;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }

        .refresh-btn:hover {
            background: #1a3607;
            transform: scale(1.05);
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            align-items: center;
        }

        .controls input {
            flex: 1;
            max-width: 300px;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        .timestamp {
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌿 Nature Vision - Admin Dashboard</h1>
            <p>Echtzeit-Überwachung aller User-Aktivitäten</p>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Benutzer</h3>
                <div class="number" id="user-count">0</div>
            </div>
            <div class="stat-card">
                <h3>Sessions</h3>
                <div class="number" id="session-count">0</div>
            </div>
            <div class="stat-card">
                <h3>Events</h3>
                <div class="number" id="event-count">0</div>
            </div>
            <div class="stat-card">
                <h3>Aktive Sessions</h3>
                <div class="number" id="active-count">0</div>
            </div>
                <div class="stat-card">
                    <h3>Reset Backend</h3>
                    <button class="refresh-btn" style="width:100%;" onclick="clearAdminData()">Daten löschen</button>
                </div>
                </div>
                <div class="users-list" id="users-list"></div>
            </div>

            <!-- Sessions Tab -->
            <div class="tab-content" id="sessions-tab">
                <div class="controls">
                    <input type="text" id="session-filter" placeholder="Nach User-ID filtern..." 
                           onkeyup="filterSessions()">
                    <button class="refresh-btn" onclick="loadSessions()">🔄 Aktualisieren</button>
                    <span class="timestamp" id="sessions-updated"></span>
                </div>
                <div class="loading" id="sessions-loading">
                    <div class="spinner"></div>
                </div>
                <div class="sessions-list" id="sessions-list"></div>
            </div>

            <!-- Events Tab -->
            <div class="tab-content" id="events-tab">
                <div class="controls">
                    <input type="text" id="event-filter" placeholder="Nach User-ID oder Event-Type filtern..." 
                           onkeyup="filterEvents()">
                    <button class="refresh-btn" onclick="loadEvents()">🔄 Aktualisieren</button>
                    <span class="timestamp" id="events-updated"></span>
                </div>
                <div class="loading" id="events-loading">
                    <div class="spinner"></div>
                </div>
                <div class="events-list" id="events-list"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3001/api';
        let allUsers = [];
        let allSessions = [];
        let allEvents = [];

        // ─── Tab Switching ────────────────────────────────────────────────

        function switchTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // Show selected tab
            document.getElementById(tabName + '-tab').classList.add('active');
            event.target.classList.add('active');

            // Load data
            if (tabName === 'users') loadUsers();
            else if (tabName === 'sessions') loadSessions();
            else if (tabName === 'events') loadEvents();
        }

        // ─── Load Data ────────────────────────────────────────────────────

        async function loadUsers() {
            const loading = document.getElementById('users-loading');
            loading.style.display = 'block';

            try {
                const response = await fetch(`${API_BASE}/admin/users`);
                const data = await response.json();
                allUsers = data.users;

                document.getElementById('user-count').textContent = data.totalUsers;
                document.getElementById('users-updated').textContent = 'Gerade aktualisiert';

                renderUsers();
            } catch (error) {
                console.error('Error loading users:', error);
            } finally {
                loading.style.display = 'none';
            }
        }

        async function loadSessions() {
            const loading = document.getElementById('sessions-loading');
            loading.style.display = 'block';

            try {
                const response = await fetch(`${API_BASE}/admin/sessions`);
                const data = await response.json();
                allSessions = data.sessions;

                document.getElementById('session-count').textContent = data.totalSessions || 0;
                const activeSessions = allSessions.filter(s => !s.endTime).length;
                document.getElementById('active-count').textContent = activeSessions;

                document.getElementById('sessions-updated').textContent = 'Gerade aktualisiert';
                renderSessions();
            } catch (error) {
                console.error('Error loading sessions:', error);
            } finally {
                loading.style.display = 'none';
            }
        }

        async function loadEvents() {
            const loading = document.getElementById('events-loading');
            loading.style.display = 'block';

            try {
                const response = await fetch(`${API_BASE}/admin/events`);
                const data = await response.json();
                allEvents = data.events;

                document.getElementById('event-count').textContent = data.totalEvents || 0;

                document.getElementById('events-updated').textContent = 'Gerade aktualisiert';
                renderEvents();
            } catch (error) {
                console.error('Error loading events:', error);
            } finally {
                loading.style.display = 'none';
            }
        }

        // ─── Render Data ──────────────────────────────────────────────────

        function renderUsers() {
            const list = document.getElementById('users-list');
            list.innerHTML = allUsers.map(user => `
                <div class="user-item" onclick="toggleDetails(this)">
                    <div class="item-header">
                        <div>
                            <strong>${user.name}</strong>
                            <span class="id">${user.userId.substring(0, 12)}...</span>
                        </div>
                        <div class="item-meta">
                            <span>📱 ${user.sessionCount} Sessions</span>
                            <span>📊 ${user.eventCount} Events</span>
                        </div>
                    </div>
                    <div class="item-meta">
                        <span class="timestamp">Erstellt: ${new Date(user.createdAt).toLocaleString('de-DE')}</span>
                    </div>
                    <div class="item-details">
                        <div class="detail-row">
                            <span class="detail-label">User-ID:</span>
                            <span class="detail-value">${user.userId}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderSessions() {
            const list = document.getElementById('sessions-list');
            const filter = document.getElementById('session-filter')?.value || '';

            const filtered = allSessions.filter(s => 
                s.userId.includes(filter) || s.sessionId.includes(filter)
            );

            list.innerHTML = filtered.map(session => `
                <div class="session-item" onclick="toggleDetails(this)">
                    <div class="item-header">
                        <div>
                            <strong>${session.sessionId.substring(0, 12)}...</strong>
                            <span class="id">${session.userId.substring(0, 12)}...</span>
                        </div>
                        <div>${session.endTime ? '✅' : '🔴'} ${session.endTime ? 'Beendet' : 'Aktiv'}</div>
                    </div>
                    <div class="item-meta">
                        <span>Start: ${new Date(session.startTime).toLocaleTimeString('de-DE')}</span>
                        ${session.duration ? `<span>Dauer: ${formatDuration(session.duration)}</span>` : ''}
                        <span>Events: ${session.events?.length || 0}</span>
                    </div>
                    <div class="item-details">
                        <div class="detail-row">
                            <span class="detail-label">Session-ID:</span>
                            <span class="detail-value">${session.sessionId}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">User-ID:</span>
                            <span class="detail-value">${session.userId}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Start-Zeit:</span>
                            <span class="detail-value">${new Date(session.startTime).toLocaleString('de-DE')}</span>
                        </div>
                        ${session.endTime ? `
                        <div class="detail-row">
                            <span class="detail-label">End-Zeit:</span>
                            <span class="detail-value">${new Date(session.endTime).toLocaleString('de-DE')}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Dauer:</span>
                            <span class="detail-value">${formatDuration(session.duration)}</span>
                        </div>
                        ` : ''}
                    </div>
                </div>
            `).join('');
        }

        function renderEvents() {
            const list = document.getElementById('events-list');
            const filter = document.getElementById('event-filter')?.value || '';

            const filtered = allEvents.filter(e => 
                e.userId.includes(filter) || 
                e.eventType.includes(filter) ||
                e.sessionId.includes(filter)
            );

            list.innerHTML = filtered.map(event => `
                <div class="event-item" onclick="toggleDetails(this)">
                    <div class="item-header">
                        <div>
                            <span class="event-type">${event.eventType}</span>
                            <span class="id">${event.userId.substring(0, 12)}...</span>
                        </div>
                        <div class="timestamp">${new Date(event.timestamp).toLocaleTimeString('de-DE')}</div>
                    </div>
                    <div class="item-details">
                        <div class="detail-row">
                            <span class="detail-label">Event-ID:</span>
                            <span class="detail-value">${event.eventId}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Session-ID:</span>
                            <span class="detail-value">${event.sessionId.substring(0, 20)}...</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Zeit:</span>
                            <span class="detail-value">${new Date(event.timestamp).toLocaleString('de-DE')}</span>
                        </div>
                        ${event.data ? `
                        <div class="detail-row">
                            <span class="detail-label">Daten:</span>
                            <span class="detail-value"><pre>${JSON.stringify(event.data, null, 2)}</pre></span>
                        </div>
                        ` : ''}
                    </div>
                </div>
            `).join('');
        }

        // ─── Utilities ────────────────────────────────────────────────────

        function toggleDetails(element) {
            element.classList.toggle('expanded');
            element.querySelector('.item-details').classList.toggle('show');
        }

        function formatDuration(seconds) {
            const minutes = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${minutes}m ${secs}s`;
        }

        function filterSessions() {
            renderSessions();
        }

        function filterEvents() {
            renderEvents();
        }

        // ─── Initial Load ────────────────────────────────────────────────

        async function clearAdminData() {
            if (!confirm('Alle Admin-Daten löschen? Dadurch werden Nutzer, Sessions, Events und Analysen entfernt.')) {
                return;
            }

            try {
                await fetch(`${API_BASE}/admin/clear`, { method: 'POST' });
                loadUsers();
                loadSessions();
                loadEvents();
            } catch (error) {
                console.error('Error clearing admin data:', error);
            }
        }

        window.addEventListener('load', () => {
            loadUsers();
            loadSessions();
            loadEvents();

            // Auto-refresh every 10 seconds
            setInterval(() => {
                loadSessions();
                loadEvents();
            }, 10000);
        });
    </script>
</body>
</html>
